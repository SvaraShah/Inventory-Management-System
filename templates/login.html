{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="card-bg p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 dark:border-gray-700 transition-colors duration-300">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 dark:bg-indigo-900/50 mb-4 shadow-sm">
                <i data-lucide="boxes" class="w-8 h-8 text-indigo-600 dark:text-indigo-400"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2 tracking-tight">Welcome Back</h2>
            <p class="text-sm text-gray-600 dark:text-gray-400">Sign in to manage your inventory</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
            <div class="space-y-4">
                <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 sr-only">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user" class="w-5 h-5 text-gray-400 dark:text-gray-500"></i>
                    </div>
                    <input type="text" name="username" id="username" required placeholder="Username" 
                        class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-xl leading-5 bg-gray-50 dark:bg-gray-800 placeholder-gray-500 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors sm:text-sm">
                </div>
                
                <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 sr-only">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="lock" class="w-5 h-5 text-gray-400 dark:text-gray-500"></i>
                    </div>
                    <input type="password" name="password" id="password" required placeholder="Password" 
                        class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-xl leading-5 bg-gray-50 dark:bg-gray-800 placeholder-gray-500 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors sm:text-sm">
                </div>

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="shield-check" class="w-5 h-5 text-gray-400 dark:text-gray-500"></i>
                    </div>
                    <select name="role" required class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-xl leading-5 bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors sm:text-sm appearance-none">
                        <option value="admin">Login as Admin</option>
                        <option value="user" selected>Login as User</option>
                        <option value="customer">Login as Customer</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                Sign In
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm">
            <span class="text-gray-500 dark:text-gray-400">Don't have an account?</span>
            <a href="{{ url_for('register') }}" class="font-medium text-indigo-600 dark:text-indigo-400 hover:text-indigo-500">Register here</a>
        </div>
        
        <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-800 text-center">
            <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Developed by</p>
            <p class="text-sm font-bold text-indigo-600 dark:text-indigo-400">Svara Shah • svarashah215@gmail.com</p>
        </div>
    </div>
</div>
{% endblock %}
